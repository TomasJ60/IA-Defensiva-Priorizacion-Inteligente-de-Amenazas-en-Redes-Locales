<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agente IA — Acceso denegado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:#080b0f;color:#dde4ed;font-family:'DM Sans',sans-serif;padding:24px}
.card{width:min(560px,100%);background:#0f1318;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.eyebrow{font-size:11px;color:#5e6e82;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.title{font-size:26px;font-weight:600;margin-bottom:8px}
.copy{font-size:13px;color:#8a9ab0;margin-bottom:14px;line-height:1.6}
.btn-outline{display:block;width:100%;border-radius:8px;padding:12px;font-size:14px;font-weight:600;text-align:center;text-decoration:none;background:#151b24;color:#dde4ed;border:1px solid rgba(255,255,255,.07);margin-top:16px}
</style>
</head>
<body>
<main class="card">
  <div class="eyebrow">Acceso restringido</div>
  <h1 class="title">Acceso denegado</h1>
  <p class="copy">Tu cuenta inicio sesion correctamente, pero no tiene un rol autorizado para esta operacion dentro de la consola del Agente.</p>
  {% if role_label %}
  <p class="copy">Rol detectado: <strong>{{ role_label }}</strong></p>
  {% endif %}
  <a href="{% url 'logout' %}" class="btn-outline">Cerrar sesion</a>
</main>
</body>
</html>
