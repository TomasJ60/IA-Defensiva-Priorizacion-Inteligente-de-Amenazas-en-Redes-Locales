<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerrar sesion | SOC IA Defensiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            color: #e7eef7;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(57, 180, 255, 0.14), transparent 20%),
                radial-gradient(circle at top right, rgba(255, 107, 107, 0.1), transparent 18%),
                linear-gradient(180deg, #061019 0%, #07131d 48%, #071018 100%);
            padding: 24px;
        }
        .card {
            width: min(560px, 100%);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: linear-gradient(180deg, rgba(11, 23, 34, 0.9) 0%, rgba(7, 18, 29, 0.96) 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
        }
        .eyebrow { color: #8ea3b8; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.78rem; font-weight: 600; }
        .title { font-family: 'Space Grotesk', sans-serif; font-size: 2.3rem; margin: 14px 0 12px; }
        .copy { color: #8ea3b8; }
        .btn-soc, .btn-soc-outline {
            min-height: 48px;
            border-radius: 14px;
            font-weight: 700;
        }
        .btn-soc { border: 0; color: #04111a; background: linear-gradient(90deg, #2ea7ff, #4ad08d); }
        .btn-soc-outline { border: 1px solid rgba(148, 163, 184, 0.16); color: #e7eef7; background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
    <main class="card">
        <div class="eyebrow"><i class="bi bi-box-arrow-right me-2"></i>Cierre de sesion</div>
        <h1 class="title">Salir del dashboard</h1>
        <p class="copy">Si confirmas, se cerrara la sesion actual y volveras al formulario de acceso protegido por 2FA.</p>
        <form method="post" class="d-grid gap-2 mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-soc">Cerrar sesion ahora</button>
            <a href="{% url 'soc_dashboard' %}" class="btn btn-soc-outline">Volver al dashboard</a>
        </form>
    </main>
</body>
</html>
