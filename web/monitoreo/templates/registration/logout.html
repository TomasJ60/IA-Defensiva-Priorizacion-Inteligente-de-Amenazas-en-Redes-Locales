<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agente IA — Cerrar sesion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:#080b0f;color:#dde4ed;font-family:'DM Sans',sans-serif;padding:24px}
.card{width:min(560px,100%);background:#0f1318;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.eyebrow{font-size:11px;color:#5e6e82;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.title{font-size:26px;font-weight:600;margin-bottom:8px}
.copy{font-size:13px;color:#8a9ab0;margin-bottom:18px;line-height:1.6}
.btn,.btn-outline{display:block;width:100%;border-radius:8px;padding:12px;font-size:14px;font-weight:600;text-align:center;text-decoration:none}
.btn{background:#4a8fff;color:#fff;border:none}
.btn-outline{background:#151b24;color:#dde4ed;border:1px solid rgba(255,255,255,.07);margin-top:10px}
</style>
</head>
<body>
<main class="card">
  <div class="eyebrow">Cierre de sesion</div>
  <h1 class="title">Salir del Agente</h1>
  <p class="copy">Si confirmas, se cerrara la sesion actual y tendras que volver a autenticarte con segundo factor para entrar de nuevo.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">Cerrar sesion ahora</button>
  </form>
  <a href="{% url 'soc_dashboard' %}" class="btn-outline">Volver al dashboard</a>
</main>
</body>
</html>
