<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar 2FA | SOC IA Defensiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            color: #e7eef7;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(57, 180, 255, 0.14), transparent 20%),
                radial-gradient(circle at top right, rgba(74, 208, 141, 0.12), transparent 18%),
                linear-gradient(180deg, #061019 0%, #07131d 48%, #071018 100%);
            padding: 24px;
        }
        .card {
            width: min(560px, 100%);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: linear-gradient(180deg, rgba(11, 23, 34, 0.9) 0%, rgba(7, 18, 29, 0.96) 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
        }
        .eyebrow { color: #8ea3b8; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.78rem; font-weight: 600; }
        .title { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; margin: 14px 0 12px; }
        .copy { color: #8ea3b8; }
        .form-control {
            min-height: 50px;
            background: rgba(6, 13, 20, 0.75);
            border: 1px solid rgba(163, 184, 204, 0.14);
            color: #e7eef7;
        }
        .form-control:focus {
            background: rgba(6, 13, 20, 0.95);
            color: #e7eef7;
            border-color: rgba(57, 180, 255, 0.55);
            box-shadow: 0 0 0 0.2rem rgba(57, 180, 255, 0.15);
        }
        .btn-soc, .btn-soc-outline {
            min-height: 48px;
            border-radius: 14px;
            font-weight: 700;
        }
        .btn-soc { border: 0; color: #04111a; background: linear-gradient(90deg, #2ea7ff, #4ad08d); }
        .btn-soc-outline { border: 1px solid rgba(148, 163, 184, 0.16); color: #e7eef7; background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
    <main class="card">
        <div class="eyebrow"><i class="bi bi-shield-check me-2"></i>Segundo factor obligatorio</div>
        <h1 class="title">Verifica tu acceso</h1>
        <p class="copy">Introduce el codigo de 6 digitos generado por tu aplicacion autenticadora para terminar el ingreso al dashboard.</p>

        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <div class="alert alert-secondary" role="alert">
            Hora actual del servidor: <strong>{{ server_time|date:"Y-m-d H:i:s T" }}</strong>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_code" class="form-label">Codigo TOTP</label>
                <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code" class="form-control" maxlength="6" required id="id_code" placeholder="123456">
            </div>
            <button type="submit" class="btn btn-soc w-100">Validar y entrar</button>
        </form>

        <form method="post" action="{% url 'two_factor_reset' %}" class="mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-soc-outline w-100">Reconfigurar 2FA con un QR nuevo</button>
        </form>
    </main>
</body>
</html>
